# =============================================================================
# pnpm Workspace Configuration — react-native-monorepo
# =============================================================================
#
# This file is the canonical source of truth for workspace package discovery.
# pnpm does NOT read the "workspaces" field in package.json — only this file.
#
# All packages listed here can reference each other via the workspace:*
# protocol in their package.json dependencies.
#
# Monorepo structure:
#
#   apps/
#   └── native/          Expo + HeroUI Native mobile app (iOS & Android)
#
#   packages/
#   ├── ui/              Shared UI components (re-exported from @repo/ui)
#   └── typescript-config/  Shared TypeScript configurations
#
# Docs: https://pnpm.io/pnpm-workspace_yaml
# =============================================================================

packages:
  # ── Deployable Applications ────────────────────────────────────────────────
  # Each app is a standalone deployable unit with its own package.json,
  # build scripts, and platform-specific configuration.
  - "apps/*"

  # ── Shared Packages / Libraries ────────────────────────────────────────────
  # Internal packages consumed by apps via workspace:* protocol.
  # These are NOT published to npm — they exist only within this monorepo.
  - "packages/*"

# ── Build Script Permissions ─────────────────────────────────────────────────
# pnpm 10+ blocks postinstall scripts by default for security.
# Explicitly allow trusted native build tools that require compilation.
#
# See: https://pnpm.io/pnpm-workspace_yaml#allowbuilds
allowBuilds:
  esbuild: true # JavaScript bundler (used by tsup, Vite)
  sharp: true # Image processing (used by expo-image)
  unrs-resolver: true # Module resolver (used by eslint)
  uniwind-pro: true # Uniwind Pro native C++ engine
